server {
    listen 80;
    server_name _;

    location / {
        fastcgi_pass unix:/run/fcgiwrap.socket;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/cgi-bin/gitc.sh;
        fastcgi_param PATH_INFO $uri;
        fastcgi_param QUERY_STRING $query_string;
    }
}
